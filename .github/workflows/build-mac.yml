name: Build Desktop App (Windows + macOS)

on:
  workflow_dispatch:
  push:
    paths:
      - 'electron/**'
    branches:
      - master

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Create macOS icon
        working-directory: electron
        run: |
          npm install sharp --save-dev
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');
          async function makeIconset() {
            const src = path.join(__dirname, 'assets', 'iconbmd.png');
            const iconsetDir = path.join(__dirname, 'assets', 'iconbmd.iconset');
            fs.mkdirSync(iconsetDir, { recursive: true });
            const sizes = [16, 32, 64, 128, 256, 512];
            for (const size of sizes) {
              await sharp(src)
                .resize(size, size, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                .png()
                .toFile(path.join(iconsetDir, 'icon_' + size + 'x' + size + '.png'));
              const size2x = size * 2;
              if (size2x <= 1024) {
                await sharp(src)
                  .resize(size2x, size2x, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                  .png()
                  .toFile(path.join(iconsetDir, 'icon_' + size + 'x' + size + '@2x.png'));
              }
            }
            console.log('Iconset created');
          }
          makeIconset();
          "
          iconutil -c icns assets/iconbmd.iconset -o assets/iconbmd.icns
          rm -rf assets/iconbmd.iconset
          echo "Created iconbmd.icns"
          ls -la assets/iconbmd.icns

      - name: Build macOS DMG
        working-directory: electron
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List output
        working-directory: electron
        run: ls -la output/*.dmg || ls -la output/

      - name: Upload Mac DMG to Release
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_FILE=$(ls output/*.dmg | head -1)
          cp "$DMG_FILE" "output/BMD.HRMS-1.5.0.dmg"
          
          # Create release if it doesn't exist
          gh release view v1.5.0 --repo ${{ github.repository }} 2>/dev/null || \
            gh release create v1.5.0 --repo ${{ github.repository }} --title "BMD HRMS v1.5.0" --notes "Desktop app v1.5.0 - Auto-update, AM/PM shift time, avatar fix, checkout missing"
          
          gh release upload v1.5.0 "output/BMD.HRMS-1.5.0.dmg" --repo ${{ github.repository }} --clobber
          echo "Mac DMG uploaded!"
          gh release view v1.5.0 --repo ${{ github.repository }} --json assets -q '.assets[].name'

  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows Installer
        working-directory: electron
        run: npx electron-builder --win --publish never

      - name: Patch icon with rcedit
        working-directory: electron
        shell: bash
        run: |
          node -e "
          const rcedit = require('rcedit');
          rcedit('output/win-unpacked/BMD HRMS.exe', {
            icon: 'assets/iconbmd.ico',
            'version-string': {
              CompanyName: 'BMD Digital',
              FileDescription: 'BMD HRMS Desktop App',
              ProductName: 'BMD HRMS'
            }
          }).then(() => console.log('Icon patched')).catch(e => { console.error(e); process.exit(1); });
          "

      - name: Rebuild NSIS from patched unpacked
        working-directory: electron
        run: npx electron-builder --win nsis --prepackaged "output/win-unpacked"

      - name: List output
        working-directory: electron
        run: Get-ChildItem output/*.exe | Select-Object Name, Length

      - name: Upload Windows Installer to Release
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          EXE_FILE=$(ls output/*.exe | grep -i setup | head -1)
          cp "$EXE_FILE" "output/BMD.HRMS.Setup.1.5.0.exe"
          
          # Create release if it doesn't exist
          gh release view v1.5.0 --repo ${{ github.repository }} 2>/dev/null || \
            gh release create v1.5.0 --repo ${{ github.repository }} --title "BMD HRMS v1.5.0" --notes "Desktop app v1.5.0 - Auto-update, AM/PM shift time, avatar fix, checkout missing"
          
          gh release upload v1.5.0 "output/BMD.HRMS.Setup.1.5.0.exe" --repo ${{ github.repository }} --clobber
          echo "Windows installer uploaded!"
          gh release view v1.5.0 --repo ${{ github.repository }} --json assets -q '.assets[].name'
