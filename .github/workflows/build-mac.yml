name: Build macOS Desktop App

on:
  workflow_dispatch:
  push:
    paths:
      - 'electron/**'
    branches:
      - master

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Create macOS icon
        working-directory: electron
        run: |
          # Install iconutil dependencies
          npm install sharp --save-dev
          
          # Generate iconset from PNG
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');
          
          async function makeIconset() {
            const src = path.join(__dirname, 'assets', 'iconbmd.png');
            const iconsetDir = path.join(__dirname, 'assets', 'iconbmd.iconset');
            fs.mkdirSync(iconsetDir, { recursive: true });
            
            const sizes = [16, 32, 64, 128, 256, 512];
            for (const size of sizes) {
              await sharp(src)
                .resize(size, size, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                .png()
                .toFile(path.join(iconsetDir, 'icon_' + size + 'x' + size + '.png'));
              
              // @2x versions
              const size2x = size * 2;
              if (size2x <= 1024) {
                await sharp(src)
                  .resize(size2x, size2x, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                  .png()
                  .toFile(path.join(iconsetDir, 'icon_' + size + 'x' + size + '@2x.png'));
              }
            }
            console.log('Iconset created');
          }
          makeIconset();
          "
          
          # Convert iconset to icns using macOS native tool
          iconutil -c icns assets/iconbmd.iconset -o assets/iconbmd.icns
          rm -rf assets/iconbmd.iconset
          echo "Created iconbmd.icns"
          ls -la assets/iconbmd.icns

      - name: Build macOS DMG
        working-directory: electron
        run: |
          npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List output
        working-directory: electron
        run: ls -la output/*.dmg || ls -la output/

      - name: Upload to GitHub Release
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the DMG file
          DMG_FILE=$(ls output/*.dmg | head -1)
          DMG_NAME=$(basename "$DMG_FILE")
          echo "Found: $DMG_FILE ($DMG_NAME)"
          
          # Copy with standard name
          cp "$DMG_FILE" "output/BMD.HRMS-1.0.0.dmg"
          
          # Delete existing DMG from release if any
          EXISTING=$(gh release view v1.0.0 --repo ${{ github.repository }} --json assets -q '.assets[].name' 2>/dev/null | grep '.dmg' || true)
          if [ -n "$EXISTING" ]; then
            echo "Deleting existing: $EXISTING"
            gh release delete-asset v1.0.0 "$EXISTING" --repo ${{ github.repository }} --yes
          fi
          
          # Upload using gh CLI
          gh release upload v1.0.0 "output/BMD.HRMS-1.0.0.dmg" --repo ${{ github.repository }} --clobber
          
          echo "Upload complete! Verifying..."
          gh release view v1.0.0 --repo ${{ github.repository }} --json assets -q '.assets[].name'
