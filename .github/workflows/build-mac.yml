name: Build Desktop App (Windows + macOS)

on:
  workflow_dispatch:
  push:
    paths:
      - 'electron/**'
    branches:
      - master

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Create macOS icon
        working-directory: electron
        run: |
          npm install sharp --save-dev
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');
          async function makeIconset() {
            const src = path.join(__dirname, 'assets', 'iconbmd.png');
            const iconsetDir = path.join(__dirname, 'assets', 'iconbmd.iconset');
            fs.mkdirSync(iconsetDir, { recursive: true });
            const sizes = [16, 32, 64, 128, 256, 512];
            for (const size of sizes) {
              await sharp(src)
                .resize(size, size, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                .png()
                .toFile(path.join(iconsetDir, 'icon_' + size + 'x' + size + '.png'));
              const size2x = size * 2;
              if (size2x <= 1024) {
                await sharp(src)
                  .resize(size2x, size2x, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                  .png()
                  .toFile(path.join(iconsetDir, 'icon_' + size + 'x' + size + '@2x.png'));
              }
            }
            console.log('Iconset created');
          }
          makeIconset();
          "
          iconutil -c icns assets/iconbmd.iconset -o assets/iconbmd.icns
          rm -rf assets/iconbmd.iconset
          echo "Created iconbmd.icns"
          ls -la assets/iconbmd.icns

      - name: Build macOS DMG
        working-directory: electron
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List output
        working-directory: electron
        run: ls -la output/*.dmg output/*.zip output/latest-mac.yml 2>/dev/null || ls -la output/

      - name: Upload Mac DMG to Release
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="v${VERSION}"
          UPLOAD_NAME="BMD-HRMS-${VERSION}.dmg"
          UPLOAD_PATH="output/${UPLOAD_NAME}"
          DMG_FILE=$(ls output/*.dmg | head -1)
          if [ "$(basename "$DMG_FILE")" != "$UPLOAD_NAME" ]; then
            cp "$DMG_FILE" "$UPLOAD_PATH"
          fi
          
          gh release view "$RELEASE_TAG" --repo ${{ github.repository }} 2>/dev/null || \
            gh release create "$RELEASE_TAG" --repo ${{ github.repository }} --title "BMD HRMS v${VERSION}" --notes "Desktop app v${VERSION} — macOS DMG"
          
          gh release upload "$RELEASE_TAG" "$UPLOAD_PATH" --repo ${{ github.repository }} --clobber
          ZIP_PATH="output/BMD-HRMS-${VERSION}.zip"
          if [ -f "$ZIP_PATH" ]; then
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" --repo ${{ github.repository }} --clobber
          fi
          if [ -f "output/latest-mac.yml" ]; then
            gh release upload "$RELEASE_TAG" "output/latest-mac.yml" --repo ${{ github.repository }} --clobber
          fi
          echo "Mac DMG uploaded to ${RELEASE_TAG} as ${UPLOAD_NAME}"
          gh release view "$RELEASE_TAG" --repo ${{ github.repository }} --json assets -q '.assets[].name'

  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows Installer
        working-directory: electron
        run: npx electron-builder --win --publish never

      - name: Patch icon with rcedit
        working-directory: electron
        shell: bash
        run: |
          node -e "
          const { rcedit } = require('rcedit');
          rcedit('output/win-unpacked/BMD HRMS.exe', {
            icon: 'assets/iconbmd.ico',
            'version-string': {
              CompanyName: 'BMD Digital',
              FileDescription: 'BMD HRMS Desktop App',
              ProductName: 'BMD HRMS'
            }
          }).then(() => console.log('Icon patched')).catch(e => { console.error(e); process.exit(1); });
          "

      - name: Rebuild NSIS from patched unpacked
        working-directory: electron
        run: npx electron-builder --win nsis --prepackaged "output/win-unpacked"

      - name: List output
        working-directory: electron
        run: Get-ChildItem output/*.exe | Select-Object Name, Length

      - name: Upload Windows Installer to Release
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="v${VERSION}"
          UPLOAD_NAME="BMD-HRMS-Setup-${VERSION}.exe"
          UPLOAD_PATH="output/${UPLOAD_NAME}"
          EXE_FILE=$(ls output/*.exe | grep -i setup | head -1)
          if [ "$(basename "$EXE_FILE")" != "$UPLOAD_NAME" ]; then
            cp "$EXE_FILE" "$UPLOAD_PATH"
          fi
          
          gh release view "$RELEASE_TAG" --repo ${{ github.repository }} 2>/dev/null || \
            gh release create "$RELEASE_TAG" --repo ${{ github.repository }} --title "BMD HRMS v${VERSION}" --notes "Desktop app v${VERSION}"
          
          gh release upload "$RELEASE_TAG" "$UPLOAD_PATH" --repo ${{ github.repository }} --clobber
          BLOCKMAP="output/BMD-HRMS-Setup-${VERSION}.exe.blockmap"
          if [ -f "$BLOCKMAP" ]; then
            gh release upload "$RELEASE_TAG" "$BLOCKMAP" --repo ${{ github.repository }} --clobber
          fi
          if [ -f "output/latest.yml" ]; then
            gh release upload "$RELEASE_TAG" "output/latest.yml" --repo ${{ github.repository }} --clobber
          fi
          echo "Windows installer uploaded to ${RELEASE_TAG} as ${UPLOAD_NAME}"
          gh release view "$RELEASE_TAG" --repo ${{ github.repository }} --json assets -q '.assets[].name'
